services:
  - type: web
    name: dashboard-diretoria-c
    env: node
    buildCommand: npm install --include=dev && npm run build && cd server && npm install
    startCommand: cd server && node --max-old-space-size=460 server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: UPLOAD_TOKEN
        value: sjcomercial
      - key: RENDER_EXTERNAL_URL
        value: https://dashboard-diretoria-cdashboard-diretoria.onrender.com
